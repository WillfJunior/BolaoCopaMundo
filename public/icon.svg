<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: deep green -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>

    <!-- Glossy top highlight -->
    <radialGradient id="gloss" cx="50%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Trophy gold gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="40%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>

    <!-- Trophy shadow/depth -->
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>

    <!-- Ball shine -->
    <radialGradient id="ballShine" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Subtle inner glow for trophy -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <clipPath id="roundedRect">
      <rect width="512" height="512" rx="114" ry="114"/>
    </clipPath>
  </defs>

  <!-- App background with rounded corners -->
  <g clip-path="url(#roundedRect)">
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Subtle pitch lines on background -->
    <circle cx="256" cy="256" r="180" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.07"/>
    <circle cx="256" cy="256" r="120" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.06"/>
    <line x1="256" y1="50" x2="256" y2="462" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.06"/>

    <!-- Trophy cup body -->
    <g filter="url(#shadow)" transform="translate(256,248)">
      <!-- Cup body -->
      <path d="M-78,-95 L-68,62 Q-68,80 -50,80 L50,80 Q68,80 68,62 L78,-95 Z"
            fill="url(#gold)"/>
      <!-- Cup inner shadow for depth -->
      <path d="M-70,-95 L-62,55 Q-62,72 -47,72 L-10,72 L-10,-95 Z"
            fill="#b45309" fill-opacity="0.2"/>

      <!-- Handles left -->
      <path d="M-78,-60 Q-130,-60 -130,-10 Q-130,30 -78,30"
            fill="none" stroke="url(#goldDark)" stroke-width="20" stroke-linecap="round"/>
      <!-- Handles right -->
      <path d="M78,-60 Q130,-60 130,-10 Q130,30 78,30"
            fill="none" stroke="url(#goldDark)" stroke-width="20" stroke-linecap="round"/>

      <!-- Base stem -->
      <rect x="-20" y="80" width="40" height="32" rx="4" fill="url(#goldDark)"/>
      <!-- Base plate -->
      <rect x="-60" y="112" width="120" height="20" rx="8" fill="url(#goldDark)"/>

      <!-- Trophy shine highlight -->
      <path d="M-50,-85 L-20,60 Q-10,76 0,76 L0,-85 Z"
            fill="#ffffff" fill-opacity="0.13"/>

      <!-- Star on cup -->
      <polygon points="0,-52 7,-34 26,-34 11,-23 18,-5 0,-16 -18,-5 -11,-23 -26,-34 -7,-34"
               fill="#ffffff" fill-opacity="0.9"/>
    </g>

    <!-- Football (soccer ball) — bottom right accent -->
    <g transform="translate(370,370)" filter="url(#shadow)">
      <circle cx="0" cy="0" r="62" fill="#f8fafc"/>
      <!-- Pentagon patches -->
      <polygon points="0,-38 36,-12 22,32 -22,32 -36,-12"
               fill="#1e293b" fill-opacity="0.85"/>
      <!-- Surrounding hexagon patches -->
      <polygon points="0,-62 12,-44 -12,-44"
               fill="#1e293b" fill-opacity="0.7"/>
      <polygon points="36,-12 62,-16 54,10"
               fill="#1e293b" fill-opacity="0.6"/>
      <polygon points="22,32 46,46 30,58"
               fill="#1e293b" fill-opacity="0.6"/>
      <polygon points="-22,32 -46,46 -30,58"
               fill="#1e293b" fill-opacity="0.6"/>
      <polygon points="-36,-12 -62,-16 -54,10"
               fill="#1e293b" fill-opacity="0.6"/>
      <!-- Shine -->
      <circle cx="-18" cy="-22" r="16" fill="url(#ballShine)"/>
    </g>

    <!-- Glossy top layer -->
    <rect width="512" height="512" rx="114" ry="114" fill="url(#gloss)"/>
  </g>
</svg>
